name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e .
          python -m pip install pytest pytest-rerunfailures

      - name: Run tests (fast set)
        # --reruns 1: simulation-vs-theory tests are statistical; a single
        # rerun absorbs rare unlucky sample paths without hiding real breakage
        run: pytest tests/ -m "not slow" -q --reruns 1 --only-rerun AssertionError
